name: Vercel Deploy (jinstronda account)

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm/yarn/bun support)
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine deploy target
        id: env
        run: |
          DEFAULT="${{ github.event.repository.default_branch }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "$DEFAULT" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "prod_flag=--prod" >> $GITHUB_OUTPUT
          else
            echo "env=preview" >> $GITHUB_OUTPUT
            echo "prod_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.env.outputs.env }} --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build ${{ steps.env.outputs.prod_flag }} --token="$VERCEL_TOKEN"

      - name: Deploy
        run: vercel deploy --prebuilt ${{ steps.env.outputs.prod_flag }} --token="$VERCEL_TOKEN"
